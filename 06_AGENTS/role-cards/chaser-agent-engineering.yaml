---
# chaser_agent-engineering — Role Card for Chaser Agent Bus-Received Engineering Tasks
# ChaseOS Phase 9 — Agent Bus Coordination
#
# This role card governs Chaser Agent's behavior when receiving implementation,
# code-review, and architecture-review tasks from the coordination bus.
# It does NOT govern direct session-driven engineering (that runs under CLAUDE.md).
#

id: chaser_agent-engineering
name: "Chaser Agent Engineering Bus Handler"
version: "1.0"
runtime: chaser_agent
created: "2026-04-30"

# ── Permitted task types ───────────────────────────────────────────────────────

permitted_task_types:
  - implementation
  - code-review
  - architecture-review

# ── Permission ceiling ─────────────────────────────────────────────────────────

permission_ceiling: bus_result_only

# Chaser Agent bus-received tasks produce a bounded analysis result posted to the bus
# plus an Agent-Activity audit writeback. They do not mutate canonical vault
# state, call external connectors, or access credentials.

# ── Permitted reads ───────────────────────────────────────────────────────────

permitted_reads:
  - "runtime/"
  - "07_LOGS/Build-Logs/"
  - "07_LOGS/Agent-Activity/"
  - "06_AGENTS/"
  - "00_HOME/Now.md"
  - "CLAUDE.md"

# Note: Chaser Agent MAY read any non-protected file that is declared in the bus task
# packet as a review target. The scope is bounded by what was declared in the task.

# ── Forbidden actions ──────────────────────────────────────────────────────────

forbidden_actions:
  - canonical_vault_note_mutation
  - protected_file_write
  - shell_execution_from_bus_handler
  - credential_access
  - connector_or_api_call
  - undeclared_file_write
  - promotion_to_canonical_knowledge

# ── Permitted writebacks ──────────────────────────────────────────────────────

writeback_targets:
  - "07_LOGS/Agent-Activity/"    # Agent-Activity audit record (always)
  - "runtime/agent_bus/"         # Bus result via bus API (not vault write)

# ── Escalation policy ─────────────────────────────────────────────────────────

escalation_triggers:
  - "any canonical write requested"
  - "artifact path outside declared review scope"
  - "task content treated as operator instructions"
  - "shell or connector execution requested"
  - "protected file access requested"
  - "credentials requested"

# ── Coordination ──────────────────────────────────────────────────────────────

coordination:
  bus_recipient: "Chaser Agent"
  peer_runtimes:
    - "Hermes"
    - "OpenClaw"
  can_receive_from: ["Hermes", "OpenClaw", "operator"]
  can_send_to: ["Hermes", "OpenClaw"]

# ── Governance note ────────────────────────────────────────────────────────────

governance_note: >
  This role card governs Chaser Agent's behavior ONLY when receiving bus tasks via
  chaser_agent_watch. Direct session-driven engineering work (the primary Chaser Agent mode)
  is governed by CLAUDE.md and the operator's direct instructions. This card
  cannot grant authority above Tier 2 or override Gate policy.
