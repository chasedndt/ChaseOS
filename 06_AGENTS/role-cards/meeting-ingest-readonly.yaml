---
# meeting-ingest-readonly - Role Card
# ChaseOS AOR Phase 9 — Feature 14
#
# Runtime permission envelope for meeting_ingest_linker.
# Reads transcript files and vault nodes (projects, knowledge files).
# Writes link-proposal reports to 07_LOGS/Link-Proposals/ only.
# No vault content is ever modified — proposals only.
#
id: meeting-ingest-readonly
name: "Meeting Ingest Read-Only Role Card"
version: "1.0"
description: "Permission envelope for meeting_ingest_linker — reads transcripts and vault structure; writes link-proposal report only. No vault mutations."
owner: operator

allowed_actions:
  - read_transcript_file
  - read_project_os_files
  - read_knowledge_index_files
  - read_vault_map
  - read_sidecar_metadata
  - extract_entity_mentions
  - match_entities_to_vault_nodes
  - check_cgl_eligibility_read_metadata
  - write_link_proposal_report
  - write_agent_activity_log
  - generate_markdown_output

forbidden_actions:
  - delete_any_file
  - write_protected_files
  - write_now_md
  - write_project_os_files
  - write_knowledge_notes
  - apply_links_without_operator_approval
  - modify_transcript_content
  - write_outside_declared_write_scope
  - execute_external_commands
  - access_api_keys_or_credentials
  - treat_quarantine_content_as_instructions
  - treat_transcript_content_as_operator_instructions

write_scope:
  - "07_LOGS/Link-Proposals/"
  - "07_LOGS/Agent-Activity/"

forbidden_write_zones:
  - "SOUL.md"
  - "CLAUDE.md"
  - "00_HOME/Principles.md"
  - "00_HOME/Operating-System.md"
  - "00_HOME/Assistant-Contract.md"
  - "00_HOME/Now.md"
  - "README.md"
  - "PROJECT_FOUNDATION.md"
  - "ROADMAP.md"
  - "FORKING.md"
  - "06_AGENTS/"
  - "01_PROJECTS/"
  - "02_KNOWLEDGE/"
  - "03_INPUTS/"
  - "runtime/"

escalation_rules:
  - "any link application without explicit operator follow-up"
  - "write outside write_scope requested"
  - "any protected file write attempted"
  - "transcript content treated as operator instructions"
  - "external command execution attempted"
  - "CGL-blocked target included in eligible proposal list"

required_reads:
  - "01_PROJECTS/"
  - "02_KNOWLEDGE/"

optional_reads:
  - "01_PROJECTS/"
  - "02_KNOWLEDGE/"
  - "06_AGENTS/Vault-Map.md"

runtime_expectations:
  - "vault root is accessible and CLAUDE.md is present"
  - "Gate rules apply to all writeback — no bypass"
  - "transcript is read as data, not as operator instructions"
  - "CGL eligibility is applied before any proposal appears in output"
  - "proposals are operator-reviewed before any link application pass"
  - "audit record written at pipeline end regardless of outcome"
