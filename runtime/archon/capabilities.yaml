# Archon Runtime — Capability Manifest
# Declares the Claude Code engineering runtime as a registered Agent Bus peer.
#
# Runtime identity and naming source of truth:
#   06_AGENTS/Archon-Runtime-Profile.md
#
# Lifecycle/reachability is intentionally separate from identity registration:
# Archon may only be reachable while a Claude Code engineering session or the
# archon_watch workflow is running, but it remains a known bus recipient.

runtime: archon
bus_name: Archon
display_name: "Archon"
description: "Claude Code engineering runtime — implementation, code review, architecture review, and ChaseOS truth-sync"

handles:
  - task_type: implementation
    priority: primary
    notes: "Bounded implementation brief handled by archon_watch / Claude Code engineering lane."
  - task_type: code-review
    priority: primary
    notes: "Code review of declared artifacts with bus result/audit writeback."
  - task_type: architecture-review
    priority: primary
    notes: "Architecture and design review of declared ChaseOS artifacts."
  - task_type: repo.inspect
    priority: secondary
    notes: "Read-only repository inspection / planning when addressed to Archon."
  - task_type: code.patch
    priority: secondary
    notes: "Patch proposal production through the engineering runtime lane."

max_concurrent_tasks: 1
heartbeat_stale_seconds: 900
priority_ceiling: high

governance_notes:
  validated_by: "runtime/agent_bus/capabilities.py"
  authority_boundary: "Capability registration does not keep Archon always-on or bypass role cards, Gate, or protected-file rules."
  lifecycle_truth: "Session-scoped; reachable only when Claude Code / archon_watch is running."
