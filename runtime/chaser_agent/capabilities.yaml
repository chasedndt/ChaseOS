# Chaser Agent Runtime — Capability Manifest
# Declares Chaser Agent as a first-party 24/7 ChaseOS agent harness/runtime lane.
#
# Naming boundary:
# - Product/runtime label: Chaser Agent
# - Not: Chase AI, ChaseOS AI, or Chase Agent
#
# Authority boundary:
# Capability discovery identifies the harness lane only. It does not grant
# provider calls, host mutation, browser control, approval consumption, protected
# writes, or canonical promotion without separate ChaseOS governance.

runtime: chaser_agent
bus_name: "Chaser Agent"
display_name: "Chaser Agent"
description: "First-party 24/7 personal agent harness/runtime lane for ChaseOS-controlled workflows, source-card harnesses, and governed operator support."

handles:
  - task_type: personal-runtime
    priority: primary
    notes: "Always-on personal runtime harness under ChaseOS control-plane governance."
  - task_type: source-card-harness
    priority: primary
    notes: "Blueprint/control-plane first source-card harness lane for future source intelligence workflows."
  - task_type: operator-support
    priority: secondary
    notes: "Reviewable operator support packets; no unsupervised external action authority."
  - task_type: workflow-orchestration
    priority: secondary
    notes: "Governed workflow routing and handoff preparation, subject to approvals and runtime contracts."

max_concurrent_tasks: 2
heartbeat_stale_seconds: 900
priority_ceiling: high

governance_notes:
  validated_by: "runtime/agent_bus/capabilities.py"
  authority_boundary: "Chaser Agent is a 24/7 harness identity, not an automatic grant of shell, browser, provider, approval-consumption, protected-write, or canonical-promotion authority."
  live_runtime_family: "Hermes, OpenClaw, and Chaser Agent are the ChaseOS 24/7 harness/runtime lanes."
