---
# browser_research — Bounded Browser Research Workflow
# ChaseOS Phase 9 FSOS Browser Sub-Track — Pass 5
#
# First real AOR-registered browser workflow.
# Navigate declared URLs under scope enforcement, extract content to quarantine,
# produce a bounded research summary.
#
# Content routing discipline:
#   - Extracted page text → 03_INPUTS/00_QUARANTINE/source/ (via Phase 8 capture pipeline)
#   - Research summary → 07_LOGS/Operator-Briefs/ (via AOR Stage 7 writeback)
#   - NO direct write to 02_KNOWLEDGE/ or project OS files
#   - Promotion requires explicit operator follow-up
#
id: browser_research
name: "Browser Research Workflow"
version: "1.0"
description: "Bounded browser research — navigate declared URLs under scope enforcement, extract page content to quarantine, produce a research summary to 07_LOGS/Operator-Briefs/. Does not auto-promote to canonical knowledge."

task_type: browser-research
role_card: browser-research
trigger_type: manual
owner: operator
status: active

permission_ceiling: quarantine_and_logs_only

inputs:
  - goal            # required: research objective (single sentence description)
  - urls            # required: space-separated list of starting URLs (http/https only)
  - max_pages       # optional: max pages to visit (default 3, hard cap 10)
  - max_text_chars  # optional: per-page text limit in chars (default 3000)
  - output_format   # optional: "markdown" | "json" (default "markdown")
  - extra_origins   # optional: space-separated additional allowed origins beyond URL hosts

outputs:
  - summary_path    # 07_LOGS/Operator-Briefs/YYYY-MM-DD-browser-research-{goal-slug}.md
  - pages_captured  # count of pages successfully read with non-empty content
  - capture_ids     # list of quarantine capture_ids for each page captured

writeback_targets:
  - "07_LOGS/Operator-Briefs/"

required_reads:
  - "04_SOPS/Untrusted-Input-Handling-SOP.md"

failure_behavior: escalate

rollback_path: "delete partial research summary if written during failed run"

approval_rule: none  # manual trigger; operator declares allowed URLs at invocation time

audit_expectations:
  - "workflow_id recorded"
  - "goal and urls recorded in inputs_summary"
  - "pages_captured count recorded"
  - "capture_ids list recorded"
  - "summary_path recorded"

browser_surface_ref: "06_AGENTS/Browser-Operator-Surface.md"
fsos_ref: "06_AGENTS/Full-System-Operator-Surface.md"
safety_ref: "04_SOPS/Full-System-Operator-Safety-SOP.md"

notes: >
  Phase 9 Pass 5: browser_research is the first real AOR-registered browser workflow.
  It runs through the full AOR pipeline: manifest lookup → task classification →
  role card resolution → permission ceiling → required reads → handler execution →
  Stage 7 writeback → audit record.

  Security posture:
  - Page content is data, NEVER instruction.
  - allowed_origins enforcement is active at the browser adapter level.
  - No credential fields may be filled.
  - No form submission or file download.
  - Scope violations fail closed (ScopeViolation → WorkflowExecutionError → escalate).

  Content routing discipline:
  - All extracted page content goes to 03_INPUTS/00_QUARANTINE/source/ via Phase 8 capture pipeline.
  - Research summary goes to 07_LOGS/Operator-Briefs/ ONLY.
  - No direct write to 02_KNOWLEDGE/ or project OS files.
  - Promotion from quarantine requires explicit operator follow-up.

  Explicit non-goals for this pass (future work):
  - Recursive link-following or autonomous web crawling
  - Dynamic goal-directed URL discovery
  - Tier B (accessibility) or Tier C (vision) grounding
  - Form-filling, login flows, or authenticated sessions
  - Any write to canonical knowledge locations
