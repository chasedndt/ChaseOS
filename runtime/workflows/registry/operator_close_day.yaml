---
# operator_close_day — End-of-Day Close Workflow
# ChaseOS AOR Phase 9 — First-Wave Workflow
#
# Runs the end-of-day close sequence: writes daily close note,
# dedup-stats snapshot, and flags any open loops for tomorrow.
#
id: operator_close_day
name: "Operator Close Day"
version: "2.0"
description: "End-of-day close — four-layer model (CANONICAL / CARRY-FORWARD / RUNTIME RECORD / SYNTHESIS). Reads today's build logs, AOR activity, morning brief for delta detection. Writes structured carry-forward for tomorrow's operator_today."

task_type: operator-briefing
role_card: operator-briefing
trigger_type: manual
owner: operator
status: active

permission_ceiling: no_protected_file_writes

inputs:
  - date            # ISO date string; defaults to today
  - open_loops      # list of strings describing open loops; optional
  - notes           # free-form close notes from operator; optional

outputs:
  - close_note_path  # path to the written daily close note
  - open_loops_captured

writeback_targets:
  - "07_LOGS/Operator-Briefs/"

failure_behavior: escalate

rollback_path: "delete any partial close note written during this run"

approval_rule: none

audit_expectations:
  - "workflow_id recorded"
  - "close timestamp recorded"
  - "open loops count recorded"
  - "carry_forward_loop_count recorded"
  - "aor_runs_today count recorded"

schedule: cron  # 0 19 * * 1-5 America/New_York via OpenClaw; governed by ChaseOS native schedule intent
schedule_intent_ref: "runtime/schedules/sch-operator-close-day-1900.yaml"  # Phase 9 Schedule Layer — live

briefing_architecture_ref: "06_AGENTS/Operator-Briefing-Architecture.md"  # v2 — IMPLEMENTED

notes: >
  Phase 9 Briefing V2: operator_close_day now implements the four-layer close model
  defined in 06_AGENTS/Operator-Briefing-Architecture.md Section 4.

  Layers:
    [CANONICAL]      Now.md phase line + today's build logs + quarantine + recent decisions
    [CARRY-FORWARD]  Structured open loops with status:X format — machine-readable by tomorrow's
                     operator_today v2 Layer 2. Merges morning-brief loops + operator-provided loops.
                     Delta detection: compares morning carry-forward vs close-of-day state.
    [RUNTIME RECORD] Today's AOR activity records from 07_LOGS/Agent-Activity/ (today prefix only)
    [SYNTHESIS]      Delta summary, session-close checklist, tomorrow focus

  Now.md is never written. All output goes to 07_LOGS/Operator-Briefs/ only.
  Operator-provided open_loops and notes accepted via --input flags.
  Schedule: 0 19 * * 1-5 America/New_York via OpenClaw → chaseos run → AOR path.
  ChaseOS native schedule intent: runtime/schedules/sch-operator-close-day-1900.yaml (live).
