---
# hermes_promote_note - Draft bounded promotion workflow
# ChaseOS AOR Phase 9 - runtime-instance promotion substrate (draft only)
#
# Purpose:
#   Define the first draft workflow manifest shape for a Hermes
#   promotion-review path without activating canonical promotion authority.
#
id: hermes_promote_note
name: "Hermes Promote Note"
version: "1.0"
description: "Draft bounded AOR/Gate-mediated promotion workflow for one Hermes note candidate with explicit control-plane approval linkage. Not active authority."

runtime_adapter: hermes
task_type: promotion-review
role_card: hermes-promotion-review
trigger_type: manual
owner: operator
status: draft

permission_ceiling: gated_canonical_write

inputs:
  - candidate_path
  - target_path
  - source_refs
  - source_package_id
  - source_ids
  - verification_status
  - knowledge_class
  - index_update_targets
  - promotion_reason
  - operator_approval_ref
  - control_plane_request_ref

outputs:
  - promoted_note_path
  - index_update_paths
  - provenance_check_result
  - approval_linkage_record
  - promotion_record_path
  - audit_record_path
  - build_log_path

writeback_targets:
  - "02_KNOWLEDGE/"
  - "07_LOGS/Promotion-Records/"
  - "07_LOGS/Agent-Activity/"
  - "07_LOGS/Build-Logs/"

failure_behavior: escalate

rollback_path: "remove bounded writeback artifacts created by this draft workflow if the governed promotion run is rejected before finalization"

approval_rule: operator-explicit

audit_expectations:
  - "operator approval reference recorded"
  - "control-plane request reference recorded"
  - "provenance minimum result recorded"
  - "canonical write target recorded"
  - "index update targets recorded"
  - "draft workflow status recorded"

notes: >
  Draft-only substrate artifact derived from the runtime-instance promotion
  pair specification pass. This file does not activate Hermes promotion
  authority by itself. Any future activation still requires adapter-manifest
  expansion, control-plane approval linkage, Gate-aligned wiring, focused
  tests, and explicit constitutional approval.
