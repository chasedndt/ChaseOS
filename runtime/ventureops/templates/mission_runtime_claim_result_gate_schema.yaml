approved_next_step_values:
  - claim_dispatch_ingest_close_mission_dry_review_task
runtime_values:
  - Codex
consumption_policy_values:
  - exact_once
authority_rules:
  - "Agent Bus enqueue must already be consumed and the task must be open, unclaimed, non-stale, and claimable."
  - "The gate may claim exactly one local mission.run_dry_review task, dispatch only the existing local AOR dry-review handler, ingest result evidence, and close the task."
  - "The loaded state is valid only when the Agent Bus task still exists, remains owned by the runtime, and is closed to done."
  - "Mission activation remains a separate exact-once gate."
  - "The gate must not apply workflow evolution, call providers, use browsers, send externally, mutate CRM/payment systems, trade, read credentials, edit protected files, write follow-up Agent Bus tasks, or promote canonical state."
